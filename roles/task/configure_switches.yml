---
- name: Configure Cisco Switches at Scale
  hosts: switches
  gather_facts: no

  serial: 25

  tasks:

    - name: Create configuration from template
      template:
        src: templates/base_config.j2
        dest: "/tmp/{{ inventory_hostname }}.cfg"
      delegate_to: localhost

    - name: Push configuration to switch
      cisco.ios.ios_config:
        src: "/tmp/{{ inventory_hostname }}.cfg"
      register: config_result

    - name: Save running configuration
      cisco.ios.ios_config:
        save_when: modified

    - name: Verify VLAN exists
      cisco.ios.ios_command:
        commands:
          - show vlan brief
      register: vlan_check

    - name: Verify NTP configuration
      cisco.ios.ios_command:
        commands:
          - show running-config | include ntp
      register: ntp_check

    - name: Display verification results
      debug:
        msg:
          - "{{ vlan_check.stdout[0] }}"
          - "{{ ntp_check.stdout[0] }}"
